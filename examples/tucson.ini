# Final Hyundai Tucson side-view case.
# Read Tucson silhouette from examples/tucson_geometry.geom.
[case]
name = tucson

[solver]
method = lbm

[domain]
length = 18.0
height = 4.5

[mesh]
nx = 1081
ny = 271
auto_from_kolmogorov = false
les_delta_to_eta = 20.0
max_cells = 20000000
allow_large_mesh = false

[flow]
u_in = 30.0
rho = 1.225
mu = 0.0
reynolds = 800.0
cfl = 0.15
perturbation = 0.001

[les]
smagorinsky_cs = 0.30
filter_width_cells = 1.0
tau_min = 0.5001
tau_max = 2.5

[fvm]
pressure_iterations = 120
pressure_tolerance = 1e-7
pressure_omega = 0.85
nu_eff_max_factor = 200.0

[time]
steps = 120000
output_interval = 240
drag_interval = 240
log_interval = 1200

[geometry]
file = examples/tucson_geometry.geom
x0 = 4.0
y0 = 0.0
scale = 1.0
car_length = 4.64
car_height = 1.665

[output]
directory = output/tucson
prefix = tucson

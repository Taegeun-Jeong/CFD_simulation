# 새 최종 실행용 F1 generic case.
# output/f1 디렉터리에 바로 저장되도록 기존 f1_demo와 output 경로만 분리했다.
[case]
name = f1

[solver]
method = lbm

[domain]
length = 18.0
height = 4.5

[mesh]
nx = 1081
ny = 271
auto_from_kolmogorov = false
les_delta_to_eta = 20.0
max_cells = 20000000
allow_large_mesh = false

[flow]
u_in = 30.0
rho = 1.225
mu = 0.0
reynolds = 800.0
cfl = 0.15
perturbation = 0.001

[les]
smagorinsky_cs = 0.30
filter_width_cells = 1.0
tau_min = 0.5001
tau_max = 2.5

[fvm]
pressure_iterations = 120
pressure_tolerance = 1e-7
pressure_omega = 0.85
nu_eff_max_factor = 200.0

[time]
steps = 120000
output_interval = 240
drag_interval = 240
log_interval = 1200

[geometry]
preset = generic_f1_2026
file =
x0 = 4.0
y0 = 0.0
scale = 1.0
car_length = 5.50
car_height = 1.15

[output]
directory = output/f1
prefix = f1
